name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 06-lab-complete/production/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  validate-production:
    runs-on: ubuntu-latest
    needs: test-production
    steps:
      - uses: actions/checkout@v4
      - name: Build production Docker image
        run: docker build -f 06-lab-complete/production/Dockerfile -t day12-production-ci 06-lab-complete/production

  docker:
    if: github.ref == 'refs/heads/main'
    needs: validate-production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./06-lab-complete/production
          file: ./06-lab-complete/production/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/day12-streamlit-chat:production
